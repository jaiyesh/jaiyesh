name: Update Commit Stats

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute commit counts
        id: counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="jaiyesh"
          TODAY=$(date -u +%Y-%m-%d)
          WEEK_AGO=$(date -u -d '7 days ago' +%Y-%m-%d)
          MONTH_AGO=$(date -u -d '30 days ago' +%Y-%m-%d)
          YEAR_AGO=$(date -u -d '365 days ago' +%Y-%m-%d)

          count_commits() {
            local since=$1
            gh api graphql -f query='
              query($login: String!, $from: DateTime!) {
                user(login: $login) {
                  contributionsCollection(from: $from) {
                    totalCommitContributions
                    restrictedContributionsCount
                  }
                }
              }' \
              -f login="$USERNAME" \
              -f from="${since}T00:00:00Z" \
              --jq '(.data.user.contributionsCollection.totalCommitContributions + .data.user.contributionsCollection.restrictedContributionsCount) | tostring'
          }

          echo "week=$(count_commits $WEEK_AGO)"   >> "$GITHUB_OUTPUT"
          echo "month=$(count_commits $MONTH_AGO)" >> "$GITHUB_OUTPUT"
          echo "year=$(count_commits $YEAR_AGO)"   >> "$GITHUB_OUTPUT"
          echo "updated=$TODAY"                    >> "$GITHUB_OUTPUT"

      - name: Update README
        env:
          WEEK:    ${{ steps.counts.outputs.week }}
          MONTH:   ${{ steps.counts.outputs.month }}
          YEAR:    ${{ steps.counts.outputs.year }}
          UPDATED: ${{ steps.counts.outputs.updated }}
        run: python3 scripts/update_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore: update commit stats [skip ci]" &&
            git push
          )
