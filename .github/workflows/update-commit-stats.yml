name: Update Commit Stats

on:
  schedule:
    - cron: '0 0 * * 0'   # every Sunday midnight UTC
  workflow_dispatch:        # allow manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute commit counts
        id: counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          USERNAME="jaiyesh"

          TODAY=$(date -u +%Y-%m-%d)
          WEEK_AGO=$(date -u -d '7 days ago' +%Y-%m-%d)
          MONTH_AGO=$(date -u -d '30 days ago' +%Y-%m-%d)
          YEAR_AGO=$(date -u -d '365 days ago' +%Y-%m-%d)

          count_commits() {
            local since=$1
            gh api graphql -f query='
              query($login: String!, $from: DateTime!) {
                user(login: $login) {
                  contributionsCollection(from: $from) {
                    totalCommitContributions
                    restrictedContributionsCount
                  }
                }
              }' \
              -f login="$USERNAME" \
              -f from="${since}T00:00:00Z" \
              --jq '
                (.data.user.contributionsCollection.totalCommitContributions
                 + .data.user.contributionsCollection.restrictedContributionsCount)
                | tostring'
          }

          WEEK=$(count_commits "$WEEK_AGO")
          MONTH=$(count_commits "$MONTH_AGO")
          YEAR=$(count_commits "$YEAR_AGO")

          echo "week=$WEEK"   >> "$GITHUB_OUTPUT"
          echo "month=$MONTH" >> "$GITHUB_OUTPUT"
          echo "year=$YEAR"   >> "$GITHUB_OUTPUT"
          echo "updated=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Update README
        run: |
          WEEK="${{ steps.counts.outputs.week }}"
          MONTH="${{ steps.counts.outputs.month }}"
          YEAR="${{ steps.counts.outputs.year }}"
          UPDATED="${{ steps.counts.outputs.updated }}"

          # Replace the stats block between the sentinel comments
          python3 - <<'PYEOF'
          import re, os

          week  = os.environ["WEEK"]
          month = os.environ["MONTH"]
          year  = os.environ["YEAR"]
          updated = os.environ["UPDATED"]

          block = f"""<!-- COMMIT_STATS_START -->
| Period | Commits |
|--------|---------|
| 🗓️ Last 7 days | **{week}** |
| 📅 Last 30 days | **{month}** |
| 📆 Last 365 days | **{year}** |

<sub>Auto-updated every Sunday · {updated}</sub>
<!-- COMMIT_STATS_END -->"""

          with open("README.md", "r") as f:
              content = f.read()

          content = re.sub(
              r"<!-- COMMIT_STATS_START -->.*?<!-- COMMIT_STATS_END -->",
              block,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(content)
          PYEOF
        env:
          WEEK:    ${{ steps.counts.outputs.week }}
          MONTH:   ${{ steps.counts.outputs.month }}
          YEAR:    ${{ steps.counts.outputs.year }}
          UPDATED: ${{ steps.counts.outputs.updated }}

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || {
            git add README.md
            git commit -m "chore: update commit stats [skip ci]"
            git push
          }
